<!DOCTYPE html>
<html>
<head>
  <title>Health Details</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="center">

  <!-- STEP INDICATOR -->
  <div class="steps">
    <span class="active">1 Personal Info</span>
    <span>2 Dietary Preference</span>
    <span>3 Medical Values</span>
  </div>

  <div class="card">

    <!-- STEP 1 -->
    <div class="step active" id="step1">
      <h2>Personal Info</h2>

      <div class="grid">
        <input id="age" placeholder="Age">
        <input id="month" placeholder="Pregnancy Month (1-9)">
        <input id="height" placeholder="Height (cm)">
        <input id="weight" placeholder="Weight (kg)">
      </div>

      <div class="info">
        BMI: <span id="bmi">—</span> |
        Trimester: <span id="trimester">—</span>
      </div>

      <button onclick="nextStep(2)">Next</button>
    </div>

    <!-- STEP 2 -->
    <div class="step" id="step2">
      <h2>Dietary Preference</h2>

      <select id="diet">
        <option value="">Choose your preference</option>
        <option value="veg">Vegetarian</option>
        <option value="nonveg">Non-Vegetarian</option>
        <option value="vegan">Vegan</option>
        <option value="eggetarian">Eggetarian</option>
      </select>

      <div class="actions">
        <button class="secondary" onclick="nextStep(1)">Back</button>
        <button onclick="nextStep(3)">Next</button>
      </div>
    </div>

    <!-- STEP 3 -->
    <div class="step" id="step3">
      <h2>Medical Values</h2>

      <div class="grid">
        <input id="hb" placeholder="Hemoglobin">
        <input id="tsh" placeholder="TSH">
        <input id="bp" placeholder="BP Systolic">
        <input id="sugar" placeholder="Blood Sugar">
      </div>

      <div class="actions">
        <button class="secondary" onclick="nextStep(2)">Back</button>
        <button onclick="generateDiet()">Submit & Generate Plan</button>
      </div>
    </div>

  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
