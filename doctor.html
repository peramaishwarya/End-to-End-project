<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Portal | NutriMom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- CENTER WRAPPER (IMPORTANT) -->
<div class="center-wrapper">

  <!-- CARD -->
  <div class="auth-card">

    <div class="logo">
      🩺
    </div>

    <h2>Doctor Login</h2>
    <p class="subtitle">
      Login using your registered medical credentials
    </p>

    <form>
      <label>Email</label>
      <input type="email" placeholder="doctor@example.com" required>

      <label>Medical License Number</label>
      <input type="text" placeholder="Enter license number" required>

      <label>Password</label>
      <input type="password" placeholder="••••••••" required>

      <button type="submit">Login</button>
    </form>

  </div>

</div>

</body>
</html>
