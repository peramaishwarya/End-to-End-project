<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Diet Plan | NutriMom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body { background:#fffaf7; color:#3b2b2f; }

    /* NAVBAR */
    .navbar {
      height:70px;
      padding:0 80px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid #f0e4e8;
    }

    .logo { display:flex; gap:8px; font-weight:700; color:#e86b8a; }

    .nav-actions {
      display:flex;
      gap:16px;
      align-items:center;
    }

    .nav-btn {
      padding:8px 14px;
      border-radius:10px;
      border:1.5px solid #e3cfd5;
      background:transparent;
      cursor:pointer;
    }

    /* SUMMARY */
    .summary {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
      padding:40px 80px;
    }

    .summary-card {
      background:#fff;
      padding:20px;
      border-radius:18px;
      box-shadow:0 12px 30px rgba(0,0,0,0.05);
    }

    .summary-card span { font-size:13px; color:#7a646b; }
    .summary-card h3 { margin-top:6px; }

    /* PLAN */
    .container { padding:20px 80px 80px; }

    .title {
      font-size:24px;
      font-weight:700;
      margin-bottom:20px;
    }

    .badge {
      font-size:12px;
      background:#fff1c9;
      color:#9a6b00;
      padding:4px 10px;
      border-radius:20px;
      margin-left:10px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    .card {
      background:#fff;
      padding:22px;
      border-radius:18px;
      box-shadow:0 12px 30px rgba(0,0,0,0.05);
    }

    .card h4 {
      display:flex;
      justify-content:space-between;
      margin-bottom:10px;
    }

    .card ul {
      padding-left:18px;
      font-size:14px;
      color:#7a646b;
    }

    .note {
      margin-top:10px;
      font-size:12px;
      color:#a07a82;
      font-style:italic;
    }

    @media(max-width:900px){
      .summary { grid-template-columns:1fr 1fr; }
      .grid { grid-template-columns:1fr; }
      .navbar,.container { padding:20px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">👶 NutriMom</div>
    <div class="nav-actions">
      <button class="nav-btn">＋ New Profile</button>
      <span>⇦</span>
    </div>
  </header>

  <!-- SUMMARY -->
  <section class="summary" id="summary"></section>

  <!-- PLAN -->
  <section class="container">
    <div class="title">
      Your Diet Plan <span class="badge">Pending</span>
    </div>

    <div class="grid" id="dietGrid"></div>
  </section>

<script>
  const bmi = localStorage.getItem("bmi");
  const trimester = localStorage.getItem("trimester");
  const diet = localStorage.getItem("diet") || "Vegetarian";

  const risk = bmi > 30 ? "High" : bmi > 25 ? "Moderate" : "Low";
  const calories = trimester == "3rd" ? 2200 : trimester == "2nd" ? 1800 : 1600;

  document.getElementById("summary").innerHTML = `
    <div class="summary-card"><span>BMI</span><h3>${bmi}</h3></div>
    <div class="summary-card"><span>Trimester</span><h3>${trimester}</h3></div>
    <div class="summary-card"><span>Risk Level</span><h3 style="color:${risk=='Low'?'green':'#e86b8a'}">${risk}</h3></div>
    <div class="summary-card"><span>Daily Calories</span><h3>${calories}</h3></div>
  `;

  const meals = [
    { name:"Breakfast", cal:450, items:["Whole wheat paratha with curd","Warm milk","Fresh fruit"], note:"Iron, Fiber, Calcium" },
    { name:"Mid-Morning Snack", cal:180, items:["Dry fruits","Fresh yogurt","Seasonal fruit"], note:"Protein, Vitamins" },
    { name:"Lunch", cal:540, items:["Brown rice / Roti","Dal","Vegetable curry","Salad"], note:"Protein, Iron" },
    { name:"Evening Snack", cal:180, items:["Roasted chickpeas","Herbal tea"], note:"Energy, Hydration" },
    { name:"Dinner", cal:450, items:["Roti / Quinoa","Paneer / Chickpeas","Steamed vegetables"], note:"Calcium, Protein" }
  ];

  document.getElementById("dietGrid").innerHTML =
    meals.map(m => `
      <div class="card">
        <h4>${m.name} <span>${m.cal} cal</span></h4>
        <ul>${m.items.map(i=>`<li>${i}</li>`).join("")}</ul>
        <div class="note">${m.note}</div>
      </div>
    `).join("");
</script>

</body>
</html>
