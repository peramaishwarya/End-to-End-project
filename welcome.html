<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome | NutriMom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: #fffaf7;
      color: #3b2b2f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAVBAR */
    .navbar {
      height: 70px;
      padding: 0 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #fffaf7;
      border-bottom: 1px solid #f0e4e8;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 20px;
      color: #e86b8a;
    }

    .nav-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .new-profile {
      padding: 8px 14px;
      border-radius: 10px;
      border: 1.5px solid #e3cfd5;
      background: transparent;
      font-weight: 500;
      cursor: pointer;
    }

    /* CENTER CONTENT */
    .welcome-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .heart {
      font-size: 42px;
      color: #f0b5c4;
      margin-bottom: 20px;
    }

    .welcome-title {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .welcome-text {
      font-size: 15px;
      color: #7a646b;
      margin-bottom: 30px;
    }

    .create-btn {
      padding: 14px 28px;
      background-color: #e86b8a;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .create-btn:hover {
      background-color: #d85d7d;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <span>👶</span>
      <span>NutriMom</span>
    </div>

    <div class="nav-actions">
      <button class="new-profile">＋ New Profile</button>
      <span>⇦</span>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="welcome-container">
    <div class="heart">♡</div>
    <h2 class="welcome-title">Welcome to NutriMom!</h2>
    <p class="welcome-text">
      Create your health profile to get a personalized diet plan.
    </p>
    <button class="create-btn" onclick="goToProfile()">
      Create Health Profile
    </button>

  </main>
<script>
  function goToProfile() {
    window.location.href = "profile.html";
  }
</script>

</body>
</html>
