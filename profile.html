<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health Profile | NutriMom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #fffaf7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3b2b2f;
    }

    /* Progress */
    .progress {
      position: absolute;
      top: 30px;
      display: flex;
      gap: 40px;
      font-size: 14px;
      color: #9a7c85;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .step span {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #f2e6ea;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }

    .step.active span {
      background: #e86b8a;
      color: #fff;
    }

    /* Card */
    .card {
      width: 720px;
      background: #ffffff;
      padding: 40px;
      border-radius: 22px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.12);
    }

    .icon {
      width: 44px;
      height: 44px;
      background: #fdecef;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      color: #e86b8a;
      font-size: 20px;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #7a646b;
      margin-bottom: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    label {
      font-size: 13px;
      margin-bottom: 6px;
      display: block;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #e3cfd5;
      font-size: 14px;
      background: #fffaf7;
    }

    .info-box {
      margin-top: 20px;
      padding: 14px;
      background: #fffaf7;
      border-radius: 12px;
      font-size: 14px;
      color: #7a646b;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
    }

    .btn-outline {
      padding: 10px 20px;
      border-radius: 12px;
      border: 1.5px solid #e3cfd5;
      background: transparent;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-primary {
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      background: #e86b8a;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Progress Bar -->
  <div class="progress">
    <div class="step active">
      <span>1</span> Personal Info
    </div>
    <div class="step">
      <span>2</span> Dietary Preference
    </div>
    <div class="step">
      <span>3</span> Medical Values
    </div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="icon">♡</div>

    <h2>Personal Info</h2>
    <p class="subtitle">Tell us about yourself</p>

    <div class="grid">
      <div>
        <label>Age</label>
        <input type="number" placeholder="e.g. 28">
      </div>

      <div>
        <label>Pregnancy Month (1–9)</label>
        <input type="number" placeholder="e.g. 5">
      </div>

      <div>
        <label>Height (cm)</label>
        <input type="number" placeholder="e.g. 160">
      </div>

      <div>
        <label>Weight (kg)</label>
        <input type="number" placeholder="e.g. 65">
      </div>
    </div>

    <div class="info-box" id="resultBox">
      BMI: — &nbsp;&nbsp; Trimester: —
    </div>

    <button class="btn-primary" onclick="calculateAndNext()">Next →</button>


    <div class="actions">
      <button class="btn-outline" onclick="goBack()">← Cancel</button>
      <button class="btn-primary">Next →</button>
    </div>
  </div>

<script>
  function calculateAndNext() {
    const age = document.querySelector('input[placeholder="e.g. 28"]').value;
    const month = document.querySelector('input[placeholder="e.g. 5"]').value;
    const height = document.querySelector('input[placeholder="e.g. 160"]').value;
    const weight = document.querySelector('input[placeholder="e.g. 65"]').value;

    if (!age || !month || !height || !weight) {
      alert("Please fill all fields");
      return;
    }

    // BMI Calculation
    const heightM = height / 100;
    const bmi = (weight / (heightM * heightM)).toFixed(1);

    // Trimester Calculation
    let trimester = "—";
    if (month >= 1 && month <= 3) trimester = "1st";
    else if (month >= 4 && month <= 6) trimester = "2nd";
    else if (month >= 7 && month <= 9) trimester = "3rd";

    // Save values (for next screens)
    localStorage.setItem("bmi", bmi);
    localStorage.setItem("trimester", trimester);
    localStorage.setItem("age", age);
    localStorage.setItem("month", month);

    // Navigate to next screen
    window.location.href = "dietary.html";
  }
</script>


</body>
</html>
